<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero Spoiler</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="Partidos disponibles">
        <div class="brand-row">
          <div>
            <p class="eyebrow">DSports · ESPN Fans</p>
            <h1>Resúmenes sin resultado</h1>
          </div>
          <button id="refreshButton" class="icon-button" type="button" title="Actualizar lista" aria-label="Actualizar lista">
            ↻
          </button>
        </div>

        <div class="status-panel">
          <span id="statusDot" class="status-dot"></span>
          <p id="statusText">Buscando partidos de las últimas 24 horas...</p>
        </div>

        <div id="matchList" class="match-list" aria-live="polite"></div>
      </section>

      <section class="player-stage" aria-label="Reproductor seguro">
        <div class="safe-browser">
          <div id="emptyState" class="empty-state">
            <p>Seleccioná un resumen para reproducirlo en modo spoiler cero.</p>
          </div>
          <div id="playerFrame" class="player-frame is-hidden">
            <iframe
              id="youtubePlayer"
              title="Reproductor sin spoilers visibles"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
            <div id="playerCover" class="player-cover">
              <p>Video listo en modo seguro</p>
            </div>
            <div class="mask mask-top" aria-hidden="true"></div>
            <div class="mask mask-bottom" aria-hidden="true"></div>
            <div class="mask mask-left" aria-hidden="true"></div>
            <div class="mask mask-right" aria-hidden="true"></div>
          </div>
        </div>

        <div class="controls-bar">
          <button id="playPauseButton" class="primary-button" type="button" disabled>Reproducir</button>
          <button id="audioButton" class="secondary-button" type="button" disabled>Audio silenciado</button>
          <button id="stopButton" class="secondary-button" type="button" disabled>Ocultar video</button>
        </div>

        <div class="safety-note">
          <strong>Protección activa:</strong>
          no se muestran miniaturas, descripciones, comentarios, títulos originales ni páginas de YouTube.
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
